<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFRIQNOVA - Enhanced Marketplace Application</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to AFRIQNOVA</h1>
        <nav>
            <ul>
                <li><a href="#products">Products</a></li>
                <li><a href="#live-stream">Live Stream</a></li>
                <li><a href="#social-feed">Social Media Feed</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="products">
            <h2>Our Products</h2>
            <div class="product-list">
                <!-- Product items will be dynamically generated here -->
            </div>
        </section>
        <section id="live-stream">
            <h2>Live Streaming</h2>
            <!-- Live streaming content embedded here -->
        </section>
        <section id="social-feed">
            <h2>Social Media Feed</h2>
            <!-- Social media feed integration will appear here -->
        </section>
    </main>
    <footer>
        <p>Follow us on social media!</p>
        <div class="social-links">
            <a href="#">Facebook</a>
            <a href="#">Twitter</a>
            <a href="#">Instagram</a>
        </div>
    </footer>

    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
